name: Open Free macOS noVNC Web Session
on: workflow_dispatch

jobs:
  interactive-web-gui:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # 👇 This sets up the secure tunnel and gives us the interactive web console
      - name: Open Secure Web Tunnel
        uses: mxschmitt/action-tmate@v3

      # 👇 Forces the VM to stay alive while you play with it
      - name: Keep Runner Alive (Max 6 Hours)
        run: |
          echo "Keep-alive loop engaged."
          while true; do sleep 60; done