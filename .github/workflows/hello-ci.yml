name: My First CI Pipeline

# 1. Trigger: When should this pipeline run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 2. Jobs: What should the pipeline actually do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Check out our repository code
        uses: actions/checkout@v4

      - name: Step 2 - Say hello to the engineer
        run: echo "Hello! The code has been successfully pulled onto the runner."

      - name: Step 3 - Simulate running a test suite
        run: |
          echo "Running unit tests..."
          echo "All tests passed successfully!"